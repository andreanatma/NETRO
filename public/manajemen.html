<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manajemen Data - Inventory IP</title>
    <script src="js/guard.js"></script>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="css/main.css">
</head>
<body class="bg-gray-100 font-sans antialiased">

    <div id="app-container">

        <main id="main-content" class="p-6">
            <div id="loader" class="fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center hidden backdrop-blur-sm">
                <div class="loader-spinner border-4 border-t-4 border-white h-12 w-12 rounded-full animate-spin"></div>
            </div>
            
            <div id="form-modal" class="fixed inset-0 bg-black bg-opacity-60 z-40 flex items-center justify-center hidden p-4 backdrop-blur-sm transition-opacity">
                <div class="bg-white rounded-2xl shadow-2xl w-full max-w-2xl max-h-[90vh] overflow-y-auto transform scale-100 transition-transform">
                    <div class="p-8">
                        <h2 id="modal-title" class="text-2xl font-bold mb-6 text-gray-800 border-b pb-4"></h2>
                        <form id="data-form">
                            <input type="hidden" id="data-id">
                            <div id="modal-body" class="mb-6 space-y-4">
                                </div>
                            
                            <div id="modal-form-actions" class="mt-8 flex justify-end space-x-3 pt-4 border-t border-gray-100">
                                <button type="button" id="cancel-btn" class="px-6 py-2.5 bg-gray-100 text-gray-700 font-semibold rounded-xl hover:bg-gray-200 transition-colors focus:ring-2 focus:ring-gray-300">Batal</button>
                                <button type="submit" id="submit-btn" class="px-6 py-2.5 bg-blue-600 text-white font-semibold rounded-xl hover:bg-blue-700 shadow-lg hover:shadow-xl transition-all focus:ring-2 focus:ring-blue-500">Simpan</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>

            <div id="history-modal" class="fixed inset-0 bg-black bg-opacity-60 z-50 flex items-center justify-center hidden p-4 backdrop-blur-sm transition-opacity">
                <div class="bg-white rounded-2xl shadow-2xl w-full max-w-lg max-h-[80vh] flex flex-col transform scale-100 transition-transform">
                    
                    <div class="p-5 border-b border-gray-100 flex justify-between items-center bg-gray-50 rounded-t-2xl">
                        <div class="flex items-center gap-3">
                            <div class="bg-blue-100 text-blue-600 p-2 rounded-lg shadow-sm">
                                <i class="fas fa-history text-lg"></i>
                            </div>
                            <div>
                                <h3 class="text-lg font-bold text-gray-800">Riwayat Mutasi</h3>
                                <p class="text-xs text-gray-500">Catatan perubahan stok item ini.</p>
                            </div>
                        </div>
                        <button onclick="closeHistoryModal()" class="text-gray-400 hover:text-gray-600 transition-colors focus:outline-none p-1">
                            <i class="fas fa-times text-xl"></i>
                        </button>
                    </div>
                    
                    <div id="history-content" class="p-6 overflow-y-auto custom-scrollbar flex-1 space-y-4 bg-white">
                        </div>

                    <div class="p-4 border-t border-gray-100 text-right bg-gray-50 rounded-b-2xl">
                        <button onclick="closeHistoryModal()" class="px-5 py-2 bg-white border border-gray-300 text-gray-700 font-semibold rounded-lg hover:bg-gray-100 transition-colors shadow-sm text-sm">
                            Tutup
                        </button>
                    </div>
                </div>
            </div>

            <div class="content-header bg-white p-6 rounded-2xl shadow-sm mb-8 border border-gray-100">
                <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-6">
                    <div>
                        <h1 id="page-title" class="text-3xl font-extrabold text-gray-800 tracking-tight">Manajemen Data</h1>
                        <p id="info-subtitle" class="text-sm mt-1 text-gray-500 font-medium">Kelola data inventaris perangkat jaringan Anda.</p>
                    </div>
                </div>

                <div class="flex flex-col xl:flex-row justify-between items-center gap-4">
                    
                    <div class="inline-flex flex-wrap items-center bg-gray-100 p-1.5 rounded-xl border border-gray-200 shadow-inner w-full xl:w-auto justify-center xl:justify-start">
                        <button class="module-btn px-4 py-2 rounded-lg text-sm font-bold transition-all duration-300 flex items-center space-x-2 focus:outline-none" data-module="tempat">
                            <i class="fas fa-map-marker-alt"></i><span class="hidden sm:inline">Tempat</span>
                        </button>
                        <button class="module-btn px-4 py-2 rounded-lg text-sm font-bold transition-all duration-300 flex items-center space-x-2 focus:outline-none" data-module="sfp">
                            <i class="fas fa-network-wired"></i><span class="hidden sm:inline">SFP</span>
                        </button>
                        <button class="module-btn px-4 py-2 rounded-lg text-sm font-bold transition-all duration-300 flex items-center space-x-2 focus:outline-none" data-module="lpuf">
                            <i class="fas fa-server"></i><span class="hidden sm:inline">LPUF</span>
                        </button>
                        <button class="module-btn px-4 py-2 rounded-lg text-sm font-bold transition-all duration-300 flex items-center space-x-2 focus:outline-none" data-module="card">
                            <i class="fas fa-microchip"></i><span class="hidden sm:inline">Card</span>
                        </button>
                    </div>

                    <div class="flex flex-col sm:flex-row gap-3 w-full xl:w-auto items-center">
                        <div class="relative w-full sm:w-64">
                            <div class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none"><i class="fas fa-search text-gray-400"></i></div>
                            <input type="text" id="search-input" placeholder="Cari Kode/Serial/Ket..." class="bg-white border border-gray-300 text-gray-900 text-sm rounded-xl focus:ring-blue-500 focus:border-blue-500 block w-full pl-10 p-2.5 shadow-sm transition-all hover:bg-gray-50 focus:bg-white">
                        </div>

                        <div class="relative w-full sm:w-48">
                            <div class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none"><i class="fas fa-filter text-gray-400"></i></div>
                            <select id="site-filter" class="bg-white border border-gray-300 text-gray-900 text-sm rounded-xl focus:ring-blue-500 focus:border-blue-500 block w-full pl-10 p-2.5 shadow-sm transition-all hover:bg-gray-50 cursor-pointer">
                                <option value="">Semua Site</option>
                                <option value="SMG">SMG</option><option value="JGJ">JGJ</option><option value="KDS">KDS</option>
                                <option value="SLO">SLO</option><option value="PWT">PWT</option><option value="PKL">PKL</option><option value="MGL">MGL</option>
                            </select>
                        </div>

                        <button id="add-btn" class="w-full sm:w-auto px-5 py-2.5 bg-blue-600 text-white font-semibold rounded-xl hover:bg-blue-700 shadow-md hover:shadow-lg transition-all flex items-center justify-center gap-2 transform active:scale-95 whitespace-nowrap">
                            <i class="fas fa-plus"></i><span>Tambah Data</span>
                        </button>
                    </div>
                </div>
            </div>
            
            <div class="content-card bg-white rounded-2xl shadow-sm border border-gray-100 p-6">
                <div class="overflow-x-auto rounded-xl border border-gray-200">
                    <table class="w-full whitespace-nowrap text-left border-collapse">
                        <thead id="data-table-head" class="bg-gray-50 border-b border-gray-200"></thead>
                        <tbody id="data-table-body" class="divide-y divide-gray-100 bg-white"></tbody>
                    </table>
                </div>

                <div id="pagination-container" class="mt-4 flex flex-col sm:flex-row justify-between items-center gap-4 border-t border-gray-100 pt-4">
                    <span id="pagination-info" class="text-sm text-gray-500 font-medium">Menampilkan 0 data</span>
                    <div class="inline-flex rounded-md shadow-sm">
                        <button id="prev-page" class="px-4 py-2 text-sm font-medium text-gray-500 bg-white border border-gray-300 rounded-l-lg hover:bg-gray-100 hover:text-gray-700 disabled:opacity-50 disabled:cursor-not-allowed transition-colors"><i class="fas fa-chevron-left mr-1"></i> Prev</button>
                        <div id="page-numbers" class="flex"></div>
                        <button id="next-page" class="px-4 py-2 text-sm font-medium text-gray-500 bg-white border border-gray-300 rounded-r-lg hover:bg-gray-100 hover:text-gray-700 disabled:opacity-50 disabled:cursor-not-allowed transition-colors">Next <i class="fas fa-chevron-right ml-1"></i></button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/layout.js"></script>
    <script src="js/manajemen.js"></script>
</body>
</html>
