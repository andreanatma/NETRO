<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manajemen Pengguna - Inventory IP</title>
    <script src="js/guard.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="css/main.css">
    <style>
        .glass-effect {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }
        .table-container::-webkit-scrollbar { height: 8px; width: 8px; }
        .table-container::-webkit-scrollbar-track { background: #f1f1f1; }
        .table-container::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .table-container::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="bg-[#f3f4f6]">

    <div id="app-container">
        <main id="main-content" class="p-6">
            
            <div class="content-header glass-effect rounded-2xl p-6 mb-6 flex flex-col md:flex-row justify-between items-center relative overflow-hidden shadow-sm">
                <div class="relative z-10 mb-4 md:mb-0">
                    <h1 class="text-3xl font-extrabold text-gray-800 tracking-tight">User Management</h1>
                    <p class="text-gray-500 mt-1 font-medium">Kelola akses dan peran pengguna Web dan Telegram.</p>
                </div>
                <div class="relative z-10" id="header-action-container">
                    <button id="add-user-btn" class="bg-indigo-600 text-white px-5 py-2.5 rounded-xl hover:bg-indigo-700 transition-colors shadow-md font-semibold flex items-center transform active:scale-95">
                        <i class="fas fa-user-plus mr-2"></i> Tambah User Web
                    </button>
                </div>
                <div class="absolute right-0 top-0 w-64 h-full bg-gradient-to-l from-indigo-50 to-transparent opacity-60 pointer-events-none"></div>
            </div>

            <div class="flex space-x-6 mb-6 border-b border-gray-200 px-2">
                <button id="tab-web" class="pb-3 text-sm font-bold border-b-2 border-indigo-600 text-indigo-600 transition-colors flex items-center gap-2 focus:outline-none">
                    <i class="fas fa-desktop"></i> User Web
                </button>
                <button id="tab-telegram" class="pb-3 text-sm font-bold border-b-2 border-transparent text-gray-500 hover:text-indigo-600 transition-colors flex items-center gap-2 focus:outline-none">
                    <i class="fab fa-telegram text-lg"></i> User Telegram
                </button>
            </div>

            <div id="loader" class="hidden fixed inset-0 bg-white/80 z-50 flex flex-col justify-center items-center backdrop-blur-sm">
                <div class="animate-spin rounded-full h-12 w-12 border-4 border-indigo-600 border-t-transparent mb-3"></div>
                <p class="text-indigo-800 font-semibold text-sm animate-pulse">Memuat data...</p>
            </div>

            <div id="web-user-container" class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden block">
                <div class="table-container overflow-x-auto">
                    <table class="w-full text-left border-collapse whitespace-nowrap">
                        <thead class="bg-gray-50 border-b border-gray-200">
                            <tr>
                                <th class="px-6 py-4 text-xs font-bold text-gray-500 uppercase tracking-wider text-center w-16">No</th>
                                <th class="px-6 py-4 text-xs font-bold text-gray-500 uppercase tracking-wider">NIK</th>
                                <th class="px-6 py-4 text-xs font-bold text-gray-500 uppercase tracking-wider">Nama Pengguna</th>
                                <th class="px-6 py-4 text-xs font-bold text-gray-500 uppercase tracking-wider">Email</th>
                                <th class="px-6 py-4 text-xs font-bold text-gray-500 uppercase tracking-wider text-center">Role</th>
                                <th class="px-6 py-4 text-xs font-bold text-gray-500 uppercase tracking-wider text-right">Aksi</th>
                            </tr>
                        </thead>
                        <tbody id="user-table-body" class="divide-y divide-gray-100 text-sm">
                            </tbody>
                    </table>
                </div>
            </div>

            <div id="telegram-user-container" class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden hidden">
                <div class="table-container overflow-x-auto">
                    <table class="w-full text-left border-collapse whitespace-nowrap">
                        <thead class="bg-blue-50 border-b border-blue-100">
                            <tr>
                                <th class="px-6 py-4 text-xs font-bold text-blue-700 uppercase tracking-wider text-center w-16">No</th>
                                <th class="px-6 py-4 text-xs font-bold text-blue-700 uppercase tracking-wider">Chat ID</th>
                                <th class="px-6 py-4 text-xs font-bold text-blue-700 uppercase tracking-wider">Akun Telegram</th>
                                <th class="px-6 py-4 text-xs font-bold text-blue-700 uppercase tracking-wider text-center">Hak Akses (Role)</th>
                                <th class="px-6 py-4 text-xs font-bold text-blue-700 uppercase tracking-wider text-right">Aksi</th>
                            </tr>
                        </thead>
                        <tbody id="telegram-table-body" class="divide-y divide-gray-100 text-sm">
                            </tbody>
                    </table>
                </div>
            </div>

            <div id="user-modal" class="fixed inset-0 bg-black bg-opacity-60 z-50 flex items-center justify-center hidden p-4 backdrop-blur-sm transition-opacity">
                <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md transform scale-100 transition-transform">
                    <div class="p-6 border-b border-gray-100 flex justify-between items-center">
                        <h2 id="modal-title" class="text-xl font-bold text-gray-800">Tambah User</h2>
                        <button id="close-modal-x" class="text-gray-400 hover:text-gray-600 transition-colors focus:outline-none">
                            <i class="fas fa-times text-lg"></i>
                        </button>
                    </div>
                    
                    <div class="p-6">
                        <form id="user-form" class="space-y-5">
                            <input type="hidden" id="user-id">
                            
                            <div>
                                <label class="block text-sm font-bold text-gray-700 mb-1">NIK (Nomor Induk)</label>
                                <div class="relative">
                                    <i class="fas fa-id-badge absolute left-3 top-3 text-gray-400"></i>
                                    <input type="text" id="nik" class="w-full pl-10 pr-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-all text-sm font-mono" placeholder="Contoh: 12345678" required>
                                </div>
                            </div>

                            <div>
                                <label class="block text-sm font-bold text-gray-700 mb-1">Nama Lengkap</label>
                                <div class="relative">
                                    <i class="fas fa-user absolute left-3 top-3 text-gray-400"></i>
                                    <input type="text" id="username" class="w-full pl-10 pr-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-all text-sm" placeholder="Contoh: Admin Utama" required>
                                </div>
                            </div>

                            <div>
                                <label class="block text-sm font-bold text-gray-700 mb-1">Email</label>
                                <div class="relative">
                                    <i class="fas fa-envelope absolute left-3 top-3 text-gray-400"></i>
                                    <input type="email" id="email" class="w-full pl-10 pr-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-all text-sm" placeholder="user@telkom.co.id" required>
                                </div>
                            </div>

                            <div>
                                <label class="block text-sm font-bold text-gray-700 mb-1">Password</label>
                                <div class="relative">
                                    <i class="fas fa-lock absolute left-3 top-3 text-gray-400"></i>
                                    <input type="password" id="password" class="w-full pl-10 pr-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-all text-sm" placeholder="Min. 6 karakter">
                                </div>
                                <p class="text-xs text-gray-500 mt-1 italic" id="password-hint">Wajib diisi untuk user baru.</p>
                            </div>

                            <div>
                                <label class="block text-sm font-bold text-gray-700 mb-1">Role (Hak Akses)</label>
                                <div class="relative">
                                    <i class="fas fa-shield-alt absolute left-3 top-3 text-gray-400"></i>
                                    <select id="role" class="w-full pl-10 pr-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-all bg-white text-sm cursor-pointer appearance-none" required>
                                        <option value="" disabled selected>Pilih Role</option>
                                        <option value="admin">Admin (Full Akses)</option>
                                        <option value="staff">Staff (Edit Data)</option>
                                        <option value="viewer">Viewer (Hanya Lihat)</option>
                                    </select>
                                    <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-gray-500">
                                        <i class="fas fa-chevron-down text-sm"></i>
                                    </div>
                                </div>
                            </div>

                            <div class="pt-4 flex justify-end gap-3 border-t border-gray-50 mt-2">
                                <button type="button" id="cancel-btn" class="px-5 py-2.5 bg-gray-100 text-gray-700 rounded-lg hover:bg-gray-200 font-medium transition-colors text-sm">Batal</button>
                                <button type="submit" class="px-5 py-2.5 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 font-medium shadow-md transition-colors text-sm transform active:scale-95">Simpan</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>

        </main>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/layout.js"></script>
    <script src="js/user_management.js"></script>
</body>
</html>
