<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Netro Inventory</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');

        body { font-family: 'Plus Jakarta Sans', sans-serif; }

        /* --- 1. Background Grid Halus --- */
        .bg-grid-pattern {
            background-image: radial-gradient(#e5e7eb 1px, transparent 1px);
            background-size: 24px 24px;
        }

        /* --- 2. Efek Kaca 3D (Glassmorphism) --- */
        .glass-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }

        /* --- 3. Animasi Melayang (Floating) --- */
        @keyframes float-slow {
            0%, 100% { transform: translateY(0) rotate(-3deg); }
            50% { transform: translateY(-15px) rotate(-1deg); }
        }
        @keyframes float-medium {
            0%, 100% { transform: translateY(0) rotate(6deg); }
            50% { transform: translateY(-20px) rotate(8deg); }
        }
        @keyframes pulse-glow {
            0%, 100% { opacity: 0.5; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(1.1); }
        }

        .animate-float-1 { animation: float-slow 6s ease-in-out infinite; }
        .animate-float-2 { animation: float-medium 5s ease-in-out infinite; animation-delay: 1s; }
        .animate-glow { animation: pulse-glow 4s ease-in-out infinite; }

        /* --- 4. Input Field Modern --- */
        .input-wrapper {
            position: relative;
            transition: all 0.3s ease;
        }
        .input-wrapper input:focus {
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.15); /* Ring halus */
            border-color: #6366f1;
        }
        .input-wrapper input:focus + i {
            color: #6366f1;
        }
        .input-wrapper input:placeholder-shown + i {
            color: #9ca3af;
        }

        /* --- 5. Tombol 3D (Tactile) --- */
        .btn-3d {
            transition: all 0.1s;
            box-shadow: 0 4px 0 #3730a3; /* Bayangan solid di bawah */
        }
        .btn-3d:active {
            transform: translateY(4px); /* Turun saat ditekan */
            box-shadow: 0 0 0 #3730a3; /* Bayangan hilang */
        }
    </style>
</head>
<body class="bg-gray-50 h-screen w-screen overflow-hidden">

    <div class="flex h-full w-full">
        
        <div class="hidden lg:flex w-5/12 bg-slate-900 relative flex-col justify-center items-center overflow-hidden">
            
            <div class="absolute top-[-20%] left-[-20%] w-[600px] h-[600px] bg-indigo-600/30 rounded-full blur-[100px] animate-glow"></div>
            <div class="absolute bottom-[-10%] right-[-10%] w-[500px] h-[500px] bg-purple-600/30 rounded-full blur-[100px]"></div>

            <div class="relative z-10 w-full max-w-sm">
                <div class="absolute top-0 right-0 w-64 h-40 glass-card rounded-2xl p-4 transform rotate-12 translate-x-12 -translate-y-12 animate-float-2 border-t border-l border-white/20 bg-gradient-to-br from-purple-500/20 to-blue-500/20">
                    <div class="flex items-center gap-3 mb-3">
                        <div class="w-8 h-8 rounded-full bg-purple-500/50 flex items-center justify-center text-white text-xs"><i class="fas fa-server"></i></div>
                        <div class="h-2 w-20 bg-white/30 rounded-full"></div>
                    </div>
                    <div class="space-y-2">
                        <div class="h-2 w-full bg-white/10 rounded-full"></div>
                        <div class="h-2 w-3/4 bg-white/10 rounded-full"></div>
                    </div>
                </div>

                <div class="relative w-72 h-48 glass-card rounded-2xl p-6 transform -rotate-3 animate-float-1 bg-gradient-to-br from-white/10 to-white/5 shadow-2xl">
                    <div class="flex justify-between items-start mb-6">
                        <div class="w-10 h-10 rounded-lg bg-indigo-500 flex items-center justify-center text-white shadow-lg shadow-indigo-500/50">
                            <i class="fas fa-network-wired text-lg"></i>
                        </div>
                        <div class="px-2 py-1 rounded-md bg-green-500/20 text-green-300 text-[10px] font-bold border border-green-500/30">IDLE</div>
                    </div>
                    <div class="space-y-3">
                        <div class="h-3 w-2/3 bg-white/80 rounded-full"></div>
                        <div class="h-2 w-full bg-white/30 rounded-full"></div>
                        <div class="h-2 w-1/2 bg-white/30 rounded-full"></div>
                    </div>
                    <div class="absolute bottom-6 right-6 flex gap-1 items-end h-8">
                        <div class="w-1.5 h-3 bg-indigo-400 rounded-sm"></div>
                        <div class="w-1.5 h-6 bg-indigo-400 rounded-sm"></div>
                        <div class="w-1.5 h-4 bg-indigo-400 rounded-sm"></div>
                        <div class="w-1.5 h-8 bg-white rounded-sm"></div>
                    </div>
                </div>
            </div>

            <div class="relative z-10 mt-12 text-center px-8">
                <h2 class="text-3xl font-bold text-white mb-2">Manajemen Aset Cerdas</h2>
                <p class="text-indigo-200 text-sm leading-relaxed">
                    Pantau SFP, LPUF, dan Card Anda dalam satu dashboard terintegrasi dengan akurasi tinggi.
                </p>
            </div>
        </div>

        <div class="w-full lg:w-7/12 flex items-center justify-center relative bg-white bg-grid-pattern">
            
            <div class="w-full max-w-[420px] p-8">
                <div class="mb-10">
                    <div class="flex items-center gap-3 mb-2">
                        <div class="w-10 h-10 bg-indigo-600 rounded-lg flex items-center justify-center text-white shadow-lg shadow-indigo-200">
                            <i class="fas fa-cube text-xl"></i>
                        </div>
                        <span class="text-2xl font-extrabold text-gray-900 tracking-tight">Netro Inventory</span>
                    </div>
                    <h1 class="text-2xl font-bold text-gray-800 mt-6">Selamat Datang Kembali! 👋</h1>
                    <p class="text-gray-500 text-sm mt-1">Masuk untuk mengelola inventaris jaringan.</p>
                </div>

                <form id="login-form" class="space-y-5">
                    
                    <div>
                        <label for="email" class="block text-sm font-bold text-gray-700 mb-1.5">Email atau NIK</label>
                        <div class="input-wrapper relative">
                            <input type="text" id="email" class="w-full pl-11 pr-4 py-3 bg-white border-2 border-gray-200 rounded-xl text-gray-800 placeholder-gray-400 font-medium focus:outline-none transition-colors" placeholder="user@telkom.co.id / 12345" required>
                            <i class="fas fa-user absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 text-sm transition-colors pointer-events-none"></i>
                        </div>
                    </div>

                    <div>
                        <div class="flex justify-between items-center mb-1.5">
                            <label for="password" class="block text-sm font-bold text-gray-700">Password</label>
                        </div>
                        <div class="input-wrapper relative">
                            <input type="password" id="password" class="w-full pl-11 pr-12 py-3 bg-white border-2 border-gray-200 rounded-xl text-gray-800 placeholder-gray-400 font-medium focus:outline-none transition-colors" placeholder="••••••••" required>
                            <i class="fas fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 text-sm transition-colors pointer-events-none"></i>
                            
                            <button type="button" id="toggle-password" class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 hover:text-indigo-600 cursor-pointer">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                    </div>

                    <div class="pt-2">
                        <button type="submit" class="btn-3d w-full bg-indigo-600 text-white font-bold py-3.5 rounded-xl text-sm tracking-wide hover:bg-indigo-700 flex justify-center items-center gap-2">
                            <span>Masuk Sekarang</span>
                            <i class="fas fa-arrow-right"></i>
                        </button>
                    </div>

                    <div id="error-message" class="hidden flex items-center p-4 text-sm text-red-800 border border-red-200 rounded-xl bg-red-50" role="alert">
                        <i class="fas fa-exclamation-circle mr-2 text-lg"></i>
                        <span class="font-medium error-text">Info error disini.</span>
                    </div>

                </form>

                <div class="mt-10 text-center">
                    <p class="text-xs text-gray-400 font-medium">&copy; 2025 Netro Inventory System. Version 1.0</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Toggle Password Logic
        const togglePassword = document.querySelector('#toggle-password');
        const password = document.querySelector('#password');
        const icon = togglePassword.querySelector('i');

        togglePassword.addEventListener('click', function () {
            const type = password.getAttribute('type') === 'password' ? 'text' : 'password';
            password.setAttribute('type', type);
            icon.classList.toggle('fa-eye');
            icon.classList.toggle('fa-eye-slash');
        });
    </script>

    <script src="js/login.js"></script>
</body>
</html>
